grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: SECTION.adhoc.v1_medical_devices
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-SECTION.adhoc.v1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:
  - name: "entry"
    with:
      fhir: "entry"
      openehr: "$reference/items[openEHR-EHR-EVALUATION.device_summary.v0]"
    reference:
      resourceType: "DeviceUseStatement"
      mappings:
        - name: "deviceSummary"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype/items[openEHR-EHR-EVALUATION.device_summary.v0]"
          slotArchetype: "EVALUATION.device_summary.v0"

  - name: "title"
    with:
      fhir: "$fhirRoot"
      openehr: "$composition"
    manual:
      - name: "manualTitle"
        fhir:
          - path: "title"
            value: "Medical Devices and Implants"

  - name: "code"
    with:
      fhir: "code.coding"
      openehr: "$composition"
    manual:
      - name: "manualSystem"
        fhir:
          - path: "system"
            value: "http://loinc.org"
      - name: "manualCode"
        fhir:
          - path: "code"
            value: "46264-8"
      - name: "manualDisplay"
        fhir:
          - path: "display"
            value: "History of medical device use"

  # emptyReason: absence of information only (no exclusion_global for devices)
  - name: "emptyReasonAbsence"
    with:
      fhir: "emptyReason"
      openehr: "$archetype/items[openEHR-EHR-EVALUATION.absence.v2]"
    slotArchetype: "EVALUATION.absence.v2"
