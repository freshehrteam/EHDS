grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: ACTION.procedure.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-ACTION.procedure.v1
    revision: 1.4.7
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Procedure

mappings:

  - name: "ISMTransition"
    with:
      fhir: "$resource"
      openehr: "$archetype/ism_transition/current_state"
    manual:
      - name: "completedToCompleted"
        fhir:
          - path: "status"
            value: "completed"
        openehrCondition:
          targetRoot: "$openehrRoot"
          targetAttribute: "defining_code/code_string"
          operator: "one of"
          criteria: "532"
        openehr:
          - path: "defining_code/terminology_id"
            value: "openehr"
          - path: "defining_code/code_string"
            value: "532"
          - path: "value"
            value: "Completed"
        fhirCondition:
          targetRoot: "$resource"
          targetAttribute: "status"
          operator: "one of"
          criteria: "completed"


  - name: "performedDateTime"
    with:
      fhir: "$resource.performed.as(DateTime)"
      openehr: "$archetype/time"
    openehrCondition:
      targetRoot: "$archetype/description[at0001]/items[at0060]"
      targetAttribute: "value"
      operator: "empty"

#  - name: "performedPeriod"
#    with:
#      fhir: "$resource.performed.as(Period)"
#      openehr: "$archetype"
#      type: "NONE"
#    openehrCondition:
#      targetRoot: "$archetype/description[at0001]/items[at0060]"
#      targetAttribute: "value"
#      operator: "not empty"
#    followedBy:
#      mappings:
#        - name: "start"
#          with:
#            fhir: "start"
#            openehr: "$archetype/time"
#        - name: "end"
#          with:
#            fhir: "end"
#            openehr: "$archetype/description[at0001]/items[at0060]"

  - name: "code"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/description[at0001]/items[at0002]"

  - name: "reason"
    with:
      fhir: "$resource.reasonCode"
      openehr: "$archetype/description[at0001]/items[at0070]"

  - name: "outcome"
    with:
      fhir: "$resource.outcome"
      openehr: "$archetype/description[at0001]/items[at0048]"

  - name: "complication"
    with:
      fhir: "$resource.complication"
      openehr: "$archetype/description[at0001]/items[at0006]"

  - name: "note"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/description[at0001]/items[at0005]"

  - name: "bodySite"
    with:
      fhir: "$resource.bodySite"
      openehr: "$archetype/description[at0001]/items[openEHR-EHR-CLUSTER.anatomical_location.v1]"
    slotArchetype: "CLUSTER.anatomical_location.v1"

  - name: "usedDevice"
    with:
      fhir: "$resource.usedReference"
      openehr: "$archetype/description[at0001]/items[openEHR-EHR-CLUSTER.device.v1]"
    reference:
      resourceType: "Device"
      mappings:
        - name: "usedDevice"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype/description[at0001]/items[openEHR-EHR-CLUSTER.device.v1]"
          slotArchetype: "CLUSTER.device.v1"
