grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: SECTION.adhoc.v1_problems
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-SECTION.adhoc.v1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:
  - name: "entry"
    with:
      fhir: "entry"
      openehr: "$reference/items[openEHR-EHR-EVALUATION.problem_diagnosis.v1]"
    reference:
      resourceType: "Condition"
      mappings:
        - name: "problemDiagnosis"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype/items[openEHR-EHR-EVALUATION.problem_diagnosis.v1]"
          slotArchetype: "EVALUATION.problem_diagnosis.v1"

  - name: "title"
    with:
      fhir: "$fhirRoot"
      openehr: "$composition"
    manual:
      - name: "manualTitle"
        fhir:
          - path: "title"
            value: "Problems"

  - name: "code"
    with:
      fhir: "code.coding"
      openehr: "$composition"
    manual:
      - name: "manualSystem"
        fhir:
          - path: "system"
            value: "http://loinc.org"
      - name: "manualCode"
        fhir:
          - path: "code"
            value: "11450-4"
      - name: "manualDisplay"
        fhir:
          - path: "display"
            value: "Problem list Reported"

  # emptyReason: absence of information
  - name: "emptyReasonAbsence"
    with:
      fhir: "emptyReason"
      openehr: "$archetype/items[openEHR-EHR-EVALUATION.absence.v2]"
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "emptyReason.coding.code"
      operator: "not of"
      criteria: "nilknown"
    slotArchetype: "EVALUATION.absence.v2"

  # emptyReason: global exclusion (no known problems)
  - name: "emptyReasonExclusion"
    with:
      fhir: "emptyReason"
      openehr: "$archetype/items[openEHR-EHR-EVALUATION.exclusion_global.v1]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[openEHR-EHR-EVALUATION.exclusion_global.v1]/data[at0001]/items[at0002]"
      operator: "not empty"
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "emptyReason.coding.code"
      operator: "one of"
      criteria: "nilknown"
    slotArchetype: "EVALUATION.exclusion_global.v1"
